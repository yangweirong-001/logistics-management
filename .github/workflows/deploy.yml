name: 自动部署到 Vercel

# 触发条件：推送到 main 分支
on:
  push:
    branches:
      - main

# 权限设置
permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: 部署到 Vercel
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 步骤 3：安装 pnpm
      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # 步骤 4：安装依赖
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 步骤 5：构建项目
      - name: 构建项目
        run: pnpm build
        env:
          NODE_ENV: production

      # 步骤 6：部署到 Vercel
      - name: 部署到 Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      # 步骤 7：输出部署 URL
      - name: 输出部署 URL
        run: |
          echo "🚀 部署成功！"
          echo "📦 访问地址: ${{ steps.deploy.outputs.preview-url }}"
