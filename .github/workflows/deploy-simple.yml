name: 自动部署到 Vercel（简化版）

# 触发条件：推送到 main 分支
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: 构建并部署
    runs-on: ubuntu-latest

    steps:
      # 步骤 1：检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 步骤 2：设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # 步骤 3：安装 pnpm
      - name: 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      # 步骤 4：安装依赖
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      # 步骤 5：运行测试（可选）
      - name: 运行测试
        run: pnpm test || echo "跳过测试"

      # 步骤 6：构建项目
      - name: 构建项目
        run: pnpm build
        env:
          NODE_ENV: production

      # 步骤 7：安装 Vercel CLI
      - name: 安装 Vercel CLI
        run: npm install --global vercel@latest

      # 步骤 8：部署到 Vercel
      - name: 部署到 Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

      # 步骤 9：通知部署完成
      - name: 部署完成
        run: |
          echo "================================"
          echo "✅ 部署成功！"
          echo "================================"
          echo "📦 项目：物流管理系统"
          echo "🚀 环境：生产环境"
          echo "⏰ 时间：$(date)"
          echo "================================"
